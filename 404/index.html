                }</style><h1 class="next-error-h1" style="display:inline-block;margin:0;margin-right:20px;padding:0 23px 0 0;font-size:24px;font-weight:500;vertical-align:top;line-height:49px">404</h1><div style="display:inline-block;text-align:left;line-height:49px;height:49px;vertical-align:middle"><h2 style="font-size:14px;font-weight:normal;line-height:49px;margin:0;padding:0">This page could not be found<!-- -->.</h2></div></div></div></div></div><div class="ant-divider ant-divider-horizontal" role="separator"></div><footer class="ant-layout-footer" style="padding:0 24px 24px"></footer></main></section></section></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"body":"\u003ch1 id=\"luke\"\u003eLuke\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#luke\"\u003e\u003c/a\u003e\u003c/h1\u003e\n\u003cp\u003eHi there 👋. I'm a Front-end developer.\u003c/p\u003e\n\u003chr\u003e\n\u003cblockquote\u003e\n\u003cp\u003eI've often described my motivation for building software to others using imagery: I like to go find a secluded beach, build a large, magnificent sand castle, and then walk away. Will anyone notice? Probably not. Will the waves eventually destroy it? Yep. Did I still get immense satisfaction? Absolutely.\u003c/p\u003e\n\u003cp\u003e— \u003ca href=\"https://news.ycombinator.com/item?id=41497113\"\u003ealiasxneo\u003c/a\u003e\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003ca href=\"https://www.dreamsongs.com/RiseOfWorseIsBetter.html\"\u003eThe Rise of Worse is Better\u003c/a\u003e\u003c/p\u003e\n\u003cp\u003ebetter survival characteristics than the-right-thing\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote\u003e\n\u003cp\u003eWe love to see the process, not just the result. The imperfections in your work can be beautiful if they show your struggle for perfection, not a lack of care.\u003c/p\u003e\n\u003cp\u003e— \u003ca href=\"https://ralphammer.com/is-perfection-boring/\"\u003eralphammer\u003c/a\u003e\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote\u003e\n\u003cp\u003eA good match is a \u003cstrong\u003estructured\u003c/strong\u003e dance, where players aim to \u003cstrong\u003escore\u003c/strong\u003e while they are following well-defined \u003cstrong\u003erules\u003c/strong\u003e. This \u003cstrong\u003efreedom within a structure\u003c/strong\u003e is what makes it fun.\u003c/p\u003e\n\u003cp\u003e— \u003ca href=\"https://ralphammer.com/how-to-get-started/\"\u003eralphammer\u003c/a\u003e\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote\u003e\n\u003cp\u003e“Motivation often comes after starting, not before. Action produces momentum.”\u003c/p\u003e\n\u003cp\u003e— James Clear\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote\u003e\n\u003cp\u003eFocus is more about \u003cstrong\u003enot\u003c/strong\u003e keeping busy when you need to wait for something.\u003cbr\u003e\nEat the boredom for a minute.\u003c/p\u003e\n\u003cp\u003e— \u003ca href=\"/notes/ettkt3iClONnxpbGwBVLl#wodenokoto\"\u003eLife Tips\u003c/a\u003e\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003ca href=\"https://news.ycombinator.com/item?id=34213181\"\u003e4 minutes run hard enough to push heart rate to 90%, 3 minutes recover, repeat 4 times\u003c/a\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.ntnu.edu/cerg/advice\"\u003ehttps://www.ntnu.edu/cerg/advice\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.nhs.uk/live-well/exercise/running-and-aerobic-exercises/get-running-with-couch-to-5k/\"\u003eGet running with Couch to 5K\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003c/blockquote\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003ca href=\"https://www.reddit.com/r/bodyweightfitness/wiki/kb/recommended_routine/\"\u003erecommended routine - bodyweightfitness\u003c/a\u003e - I Don't Have This Much Time!\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eDon't workout at all (saves anywhere from 20 to 60 minutes, but really, really, really, really, really, really, really, really, really not recommended)\u003c/li\u003e\n\u003c/ul\u003e\n\u003c/blockquote\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003ca href=\"https://news.ycombinator.com/item?id=34779980\"\u003eJust 4 pages a day. It really adds up.\u003c/a\u003e\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote\u003e\n\u003cp\u003eI think it should be everyone's primary focus to sleep well, drink water, get outside, get active, and eat generally decently. I hate to say it, but if you're not eating a good amount of vegetables and fruit, decent protein, sleep, etc, no amount of XYZ will catch up to that detriment.\u003c/p\u003e\n\u003cp\u003e— \u003ca href=\"https://news.ycombinator.com/item?id=35056071\"\u003eCE02\u003c/a\u003e\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote\u003e\n\u003cp\u003eBefore leaving for the day I leave a comment in code: I’m working on this, need to do A, B C… to get it working.\u003c/p\u003e\n\u003cp\u003e— \u003ca href=\"https://news.ycombinator.com/item?id=40744916\"\u003emakz\u003c/a\u003e\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003chr\u003e\n\u003ch2 id=\"what-i-read-in-past\"\u003eWhat I read in past\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#what-i-read-in-past\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/notes/t9eilmx27nd8ytoelbm5v10\"\u003eWhat I read in 2024\u003c/a\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/notes/d9io1hr2n9vdbvucvy3iquj\"\u003e2023\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/notes/l4c5ilaotvka1yh10wv88cy\"\u003e2022\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003c/li\u003e\n\u003cli\u003e📝 \u003ca href=\"https://gist.github.com/Luke-SNAW\"\u003eGists\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e📜 \u003ca href=\"https://luke-snaw.github.io/Luke-SNAW__netlify-CMS.github.io/\"\u003eJournals\u003c/a\u003 ercise/running-and-aerobic-exercises/get-running-with-couch-to-5k/)\n\n\u003e [recommended routine - bodyweightfitness](https://www.reddit.com/r/bodyweightfitness/wiki/kb/recommended_routine/) - I Don't Have This Much Time!\n\u003e\n\u003e - Don't workout at all (saves anywhere from 20 to 60 minutes, but really, really, really, really, really, really, really, really, really not recommended)\n\n\u003e [Just 4 pages a day. It really adds up.](https://news.ycombinator.com/item?id=34779980)\n\n\u003e I think it should be everyone's primary focus to sleep well, drink water, get outside, get active, and eat generally decently. I hate to say it, but if you're not eating a good amount of vegetables and fruit, decent protein, sleep, etc, no amount of XYZ will catch up to that detriment.\n\u003e\n\u003e — [CE02](https://news.ycombinator.com/item?id=35056071)\n\n\u003e Before leaving for the day I leave a comment in code: I’m working on this, need to do A, B C… to get it working.\n\u003e\n\u003e — [makz](https://news.ycombinator.com/item?id=40744916)\n\n---\n\n## What I read in past\n\n- [[What I read in 2024|journal.what-i-read-in]]\n  - [[2023|journal.what-i-read-in.2023]]\n  - [[2022|journal.what-i-read-in.2022]]\n- 📝 [Gists](https://gist.github.com/Luke-SNAW)\n- 📜 [Journals](https://luke-snaw.github.io/Luke-SNAW__netlify-CMS.github.io/)\n\n---\n\n- [[journal.what-i-struggled-brag-in]]\n"},"config":{"version":5,"dev":{"enablePreviewV2":true},"commands":{"lookup":{"note":{"selectionMode":"extract","confirmVaultOnCreate":true,"vaultSelectionModeOnCreate":"smart","leaveTrace":false,"bubbleUpCreateNew":true,"fuzzThreshold":0.2}},"randomNote":{},"insertNoteLink":{"aliasMode":"none","enableMultiSelect":false},"insertNoteIndex":{"enableMarker":false},"copyNoteLink":{"aliasMode":"title"},"templateHierarchy":"template"},"workspace":{"vaults":[{"fsPath":"vault"}],"journal":{"dailyDomain":"daily","name":"journal","dateFormat":"y.MM.dd","addBehavior":"childOfDomain"},"scratch":{"name": qo9ma0z0yu1czns6pxl7y5","ok0e729ho7o09xetujkxc0m","GR5x8HnNFEN6fU2UBSEIK","yirtnlj8q24yutcf3ss1xqy","eq0wc6t7wl2wv221yb68ro4","7x2fnv4j6gxts08qk0jguny","ettkt3iClONnxpbGwBVLl","hvh5bud6yp7dc89tuh95tr9","4fvoqrplw0cweo554usbjos","1swsbrhqi9jk41v9eodyi5q","SQqYupi6EFddTerBA8RRD","hjNeNc1F2JUh0lTWanH4h","qf0l4wbrc9jgooyzexmbq5v","wb9ubf5o0zdclzundc2upyk","yvaunveftckzi8sadyi3lgg","9sb274eyqwg40c7pa193ecp","8k2ifjgqterosfjxhx0kq2r"],"parent":null,"data":{},"body":"\nHi there 👋. I'm a Front-end developer.\n\n---\n\n\u003e I've often described my motivation for building software to others using imagery: I like to go find a secluded beach, build a large, magnificent sand castle, and then walk away. Will anyone notice? Probably not. Will the waves eventually destroy it? Yep. Did I still get immense satisfaction? Absolutely.\n\u003e\n\u003e — [aliasxneo](https://news.ycombinator.com/item?id=41497113)\n\n\u003e [The Rise of Worse is Better](https://www.dreamsongs.com/RiseOfWorseIsBetter.html)\n\u003e\n\u003e better survival characteristics than the-right-thing\n\n\u003e We love to see the process, not just the result. The imperfections in your work can be beautiful if they show your struggle for perfection, not a lack of care.\n\u003e\n\u003e — [ralphammer](https://ralphammer.com/is-perfection-boring/)\n\n\u003e A good match is a **structured** dance, where players aim to **score** while they are following well-defined **rules**. This **freedom within a structure** is what makes it fun.\n\u003e\n\u003e — [ralphammer](https://ralphammer.com/how-to-get-started/)\n\n\u003e “Motivation often comes after starting, not before. Action produces momentum.”\n\u003e\n\u003e — James Clear\n\n\u003e Focus is more about **not** keeping busy when you need to wait for something.  \n\u003e Eat the boredom for a minute.\n\u003e\n\u003e — [[life-tips#wodenokoto]]\n\n\u003e [4 minutes run hard enough to push heart rate to 90%, 3 minutes recover, repeat 4 times](https://news.ycombinator.com/item?id=34213181)\n\u003e\n\u003e - https://www.ntnu.edu/cerg/advice\n\u003e - [Get running with Couch to 5K](https://www.nhs.uk/live-well/exercise/running-and-aerobic-exercises/get-running-with-couch-to-5k/)\n\n\u003e [recommended routine - bodyweightfitness](https://www.reddit.com/r/bodyweightfitness/wiki/kb/recommended_routine/) - I Don't Have This Much Time!\n\u003e\n\u003e - Don't workout at all (saves anywhere from 20 to 60 minutes, but really, really, really, really, really, really, really, really, really not recommended)\n\n\u003e [Just 4 pages a day. It really adds up.](https://news.ycombinator.com/item?id=34779980)\n\n\u003e I think it should be everyone's primary focus to sleep well, drink water, get outside, get active, and eat generally decently. I hate to say it, but if you're not eating a good amount of vegetables and fruit, decent protein, sleep, etc, no amount of XYZ will catch up to that detriment.\n\u003e\n\u003e — [CE02](https://news.ycombinator.com/item?id=35056071)\n\n\u003e Before leaving for the day I leave a comment in code: I’m working on this, need to do A, B C… to get it working.\n\u003e\n\u003e — [makz](https://news.ycombinator.com/item?id=40744916)\n\n---\n\n## What I read in past\n\n- [[What I read in 2024|journal.what-i-read-in]]\n  - [[2023|journal.what-i-read-in.2023]]\n  - [[2022|journal.what-i-read-in.2022]]\n- 📝 [Gists](https://gist.github.com/Luke-SNAW)\n- 📜 [Journals](https://luke-snaw.github.io/Luke-SNAW__netlify-CMS.github.io/)\n\n---\n\n- [[journal.what-i-struggled-brag-in]]\n"},"collectionChildren":null},"__N_SSG":true},"page":"/404","query":{},"buildId":"ypBT_jCm5PiRLYygdSJ1n","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
