<li>전면적 붕괴 vs 부분적 타격: 사회 전체의 고용 붕괴보다 무서운 건 특정 직군(마케터, 트럭 운전사 등)만 타격을 입는 상황. 규모가 작으면 사회는 이들을 돕기보다 개인의 무능으로 치부하고 방치하기 쉬움. (예를 들어, 자율주행 택시로 택시기사 전체가 실업자가 되면, 사회적 문제지만, 택시 수요가 20% 감소해서, 수입이 줄고 택시기사의 20%가 줄어든 것은 개인의 문제가 됨) - <a href="https://www.nytimes.com/2026/05/03/opinion/ai-jobs-unemployment-silicon-valley.html">Why the A.I. Job Apocalypse (Probably) Won’t Happen</a></li>
